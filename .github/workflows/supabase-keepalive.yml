name: Supabase Keep-Alive

# Free-tier Supabase projects pause after 7 days of inactivity.
# This workflow pings the database twice a week (Mon + Thu) to keep it active.
# Twice-weekly cadence gives a 3-4 day max gap, well under the 7-day pause threshold,
# with buffer for GitHub Actions scheduled-workflow delays during peak load.

on:
  schedule:
    - cron: '0 12 * * 1,4'
  workflow_dispatch:

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping Supabase REST API
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
        run: |
          if [ -z "$SUPABASE_URL" ] || [ -z "$SUPABASE_SERVICE_KEY" ]; then
            echo "Missing SUPABASE_URL or SUPABASE_SERVICE_KEY secret"
            exit 1
          fi
          status=$(curl -s -o /dev/null -w "%{http_code}" \
            -H "apikey: $SUPABASE_SERVICE_KEY" \
            -H "Authorization: Bearer $SUPABASE_SERVICE_KEY" \
            "$SUPABASE_URL/rest/v1/questions?select=id&limit=1")
          if [ "$status" != "200" ] && [ "$status" != "206" ]; then
            echo "Supabase ping failed (HTTP $status)"
            exit 1
          fi
          echo "Supabase ping OK (HTTP $status)"
